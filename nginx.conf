server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Long-cache the fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path serves index.html so React Router (using
    # BrowserRouter) can resolve client-side routes like /hotel, /mobile, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
