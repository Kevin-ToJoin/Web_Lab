<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - 100 Bugs Guide</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary: #3b82f6;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }
        th {
            background: #0f172a;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover {
            background: #334155;
        }
        .filter-row th {
            background: #1e293b;
            padding: 8px 15px;
            border-bottom: 2px solid var(--border-color);
        }
        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: #0f172a;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus, select:focus {
            border-color: var(--primary);
        }
        .level-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            white-space: nowrap;
        }
        .level-low { background: rgba(16, 185, 129, 0.2); color: var(--accent); }
        .level-med { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .level-high { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        .bug-id {
            font-family: monospace;
            color: var(--primary);
            font-weight: bold;
            white-space: nowrap;
        }
        .desc {
            color: #cbd5e1;
            font-size: 0.95rem;
        }
        .find {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .step-list li {
            margin-bottom: 4px;
        }
        th.sortable {
            cursor: pointer;
            user-select: none;
        }
        th.sortable:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Confidential Bug Catalog</h1>
            <p class="subtitle">Admin Offline Guide - 100 Intentional Defects for TestLab 101</p>
        </header>

        <table id="bugTable">
            <thead>
                <tr>
                    <th width="8%" class="sortable" onclick="toggleSort('id')" title="Click to sort">ID <span id="sort-id"></span></th>
                    <th width="10%" class="sortable" onclick="toggleSort('level')" title="Click to sort">Difficulty <span id="sort-level"></span></th>
                    <th width="20%">Title</th>
                    <th width="30%">Description</th>
                    <th width="32%">Step-by-Step Instructions</th>
                </tr>
                <tr class="filter-row">
                    <th><input type="text" id="filterId" placeholder="Search ID..." onkeyup="filterTable()"></th>
                    <th>
                        <select id="filterLevel" onchange="filterTable()">
                            <option value="">All Levels</option>
                            <option value="low">Low (1-3)</option>
                            <option value="med">Medium (4-7)</option>
                            <option value="high">High (8-10)</option>
                            <option value="1">Level 1</option>
                            <option value="2">Level 2</option>
                            <option value="3">Level 3</option>
                            <option value="4">Level 4</option>
                            <option value="5">Level 5</option>
                            <option value="6">Level 6</option>
                            <option value="7">Level 7</option>
                            <option value="8">Level 8</option>
                            <option value="9">Level 9</option>
                            <option value="10">Level 10</option>
                        </select>
                    </th>
                    <th><input type="text" id="filterTitle" placeholder="Search Title..." onkeyup="filterTable()"></th>
                    <th><input type="text" id="filterDesc" placeholder="Search Description..." onkeyup="filterTable()"></th>
                    <th><input type="text" id="filterFind" placeholder="Search Instructions..." onkeyup="filterTable()"></th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <script>
        const bugs = [{"id":"BUG-001","level":10,"title":"API Race Condition","desc":"Rapidly clicking between \"Electronics\" and other categories causes older requests to resolve after newer ones, overwriting the state.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Open the browser developer tools (Network/Console tab).</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Click \"Electronics\" (1.5s latency), then quickly click another category (0.3s latency). Wait for the first request to overwrite the second.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-002","level":6,"title":"Simulated Server Error","desc":"Searching for specific keywords crashes the API and returns a 500 error.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Open the browser developer tools (Network/Console tab).</li><li style=\"margin-top: 4px;\">Navigate to the Search bar in the top navigation.</li><li style=\"margin-top: 4px;\">Type \"error\" in the search bar.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-003","level":6,"title":"Infinite Loading","desc":"Searching for a specific keyword triggers an infinite delay, hanging the UI.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the Search bar in the top navigation.</li><li style=\"margin-top: 4px;\">Type \"infinite\" in the search bar.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-004","level":4,"title":"Equivalence Partitioning Error","desc":"Filtering by \"Home Goods\" incorrectly includes \"Electronics\" due to flawed logic.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Select the \"Home Goods\" category filter and observe the results.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-005","level":3,"title":"Off-by-one Pagination","desc":"The API returns 11 items instead of the requested 10 per page.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Open the browser developer tools (Network/Console tab).</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Count the number of items displayed on a full page.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-006","level":7,"title":"Data Integrity (Reviews)","desc":"Product PROD-002 accidentally inherits reviews from PROD-001.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Navigate to the details page for PROD-002 and compare its reviews to PROD-001.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-007","level":1,"title":"Placeholder Text","desc":"Description contains \"Lorem ipsum\" placeholder text.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Inspect the description of the 4K TV product.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-008","level":1,"title":"Typo in Product Name","desc":"The word \"Laptop\" is misspelled as \"Laptap\".","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the Search bar in the top navigation.</li><li style=\"margin-top: 4px;\">Search for \"Laptop\" or browse the Electronics category.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-009","level":1,"title":"Broken Image Link","desc":"A product image fails to load due to a broken URL.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Find the \"Laptap Stand\" product; its image will be broken.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-010","level":5,"title":"Stale State (Pagination)","desc":"Changing the page number does not actually trigger a new API request.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Open the browser developer tools (Network/Console tab).</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Click to page 2 or 3 and observe that the items do not change.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-011","level":9,"title":"XSS Vulnerability","desc":"Search input is rendered directly into the DOM without escaping.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Open the browser developer tools (Network/Console tab).</li><li style=\"margin-top: 4px;\">Navigate to the Search bar in the top navigation.</li><li style=\"margin-top: 4px;\">Type \\`<script>alert(1)<\\/script>\\` or similar into the search bar.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-012","level":7,"title":"React Key Duplication","desc":"Multiple products render with the same React key, causing console warnings and rendering glitches.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Open browser console and load the catalog page.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-013","level":1,"title":"Missing Accessibility Label","desc":"The \"Add to Cart\" button lacks an aria-label or accessible text.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Add an arbitrary item to your shopping cart to begin.</li><li style=\"margin-top: 4px;\">Inspect the \"Add to Cart\" button in the DOM.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-014","level":2,"title":"Missing Hover State","desc":"The secondary button lacks a hover CSS state due to inline overrides.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Hover over the secondary button on a product card.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-015","level":10,"title":"Floating Point Strict Equality","desc":"Cart total calculation fails strict equality checks due to floating point drift.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Add an arbitrary item to your shopping cart to begin.</li><li style=\"margin-top: 4px;\">Add multiple items with decimal prices (e.g., $19.99) and observe the cart total logic.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-016","level":5,"title":"Stale Total Items","desc":"The cart header displays a stale count of total items.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Add an arbitrary item to your shopping cart to begin.</li><li style=\"margin-top: 4px;\">Add an item to the cart and check the header count.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-017","level":9,"title":"Password Hash Leak","desc":"The User Profile page leaks the user password hash to the frontend.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Open the User Profile page and inspect the Redux/Context state or network response.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-018","level":8,"title":"Missing Total in Order","desc":"Order confirmation shows an order with a total of $0.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Proceed to the Checkout flow with at least one item.</li><li style=\"margin-top: 4px;\">Complete a checkout and view the order confirmation for ORD-9999.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-019","level":10,"title":"Double Submission (Checkout)","desc":"The payment button can be clicked multiple times rapidly, submitting multiple charges.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Open the browser developer tools (Network/Console tab).</li><li style=\"margin-top: 4px;\">Proceed to the Checkout flow with at least one item.</li><li style=\"margin-top: 4px;\">Rapidly double-click the \"Pay Now\" button during checkout.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-020","level":4,"title":"Missing Shipping Validation","desc":"The shipping form allows navigation to the next step without filling required fields.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Click \"Next\" on the shipping form without entering an address.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-021","level":6,"title":"Silent Failure on API Error","desc":"If the product detail API fails, the page stays blank silently instead of showing an error.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Open the browser developer tools (Network/Console tab).</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Block the network request for a product detail or force it to fail.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-022","level":2,"title":"Broken Navigation Link","desc":"A promotional link on the product detail page leads to a 404.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Click the promotional banner link on a product page.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-023","level":2,"title":"Disabled Button active","desc":"A button visually appears disabled but still responds to click events.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Click the \"Out of Stock\" button on a sold-out product.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-024","level":3,"title":"Missing MaxLength Prop","desc":"An input field allows unlimited characters, overflowing the UI.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the Search bar in the top navigation.</li><li style=\"margin-top: 4px;\">Type a very long string into the review or search input.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-025","level":5,"title":"Cart Stale State (Removal)","desc":"Removing the last item from the cart fails to recalculate the total immediately.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Add an arbitrary item to your shopping cart to begin.</li><li style=\"margin-top: 4px;\">Add 1 item, remove it, and observe the cart total remains non-zero momentarily.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-026","level":3,"title":"Boundary Value (Shipping)","desc":"Free shipping threshold uses `> 100` instead of `>= 100`.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Add an arbitrary item to your shopping cart to begin.</li><li style=\"margin-top: 4px;\">Create a cart exactly equal to $100 and observe that shipping is still charged.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-027","level":8,"title":"Regex Decision Table Failure","desc":"Cart coupon logic fails for complex alphanumeric codes.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Apply a valid coupon code that contains special characters.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-028","level":8,"title":"Complex Logic Error (Discount)","desc":"Applying two overlapping discounts results in an incorrect total.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Apply both a percentage discount and a fixed amount discount.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-029","level":9,"title":"Session Hijacking Simulation","desc":"Cart context does not validate session token on certain actions.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loaded.</li><li style=\"margin-top: 4px;\">Add an arbitrary item to your shopping cart to begin.</li><li style=\"margin-top: 4px;\">Simulate a session timeout and try adding to cart.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-030","level":6,"title":"Raw Error Display","desc":"An API error exposes raw JSON or stack trace to the user.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Open the browser developer tools (Network/Console tab).</li><li style=\"margin-top: 4px;\">Navigate to the relevant page (e.g. Catalog Hub or Product Detail).</li><li style=\"margin-top: 4px;\">Trigger an API error and look at the UI.</li><li style=\"margin-top: 4px;\">Observe the behavior to confirm the bug is present exactly as described.</li></ol>"},{"id":"BUG-031","level":7,"title":"Data Integrity (Cart Update)","desc":"Updating item quantity shifts array indices, corrupting cart state.","find":"<ol class=\"step-list\" style=\"padding-left: 1.2rem; margin: 0;\"><li>Launch the web application and ensure it is fully loade         function getLevelClass(level) {
            if (level <= 3) return 'level-low';
            if (level <= 7) return 'level-med';
            return 'level-high';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.forEach(bug => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="bug-id">${bug.id}</td>
                    <td><span class="level-badge ${getLevelClass(bug.level)}">Level ${bug.level}</span></td>
                    <td><strong>${bug.title}</strong></td>
                    <td class="desc">${bug.desc}</td>
                    <td class="find">${bug.find}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        let currentSortColumn = '';
        let currentSortDirection = 1;

        function toggleSort(column) {
            if (currentSortColumn === column) {
                currentSortDirection *= -1;
            } else {
                currentSortColumn = column;
                currentSortDirection = 1;
            }
            
            document.getElementById('sort-id').textContent = '';
            document.getElementById('sort-level').textContent = '';
            
            const arrow = currentSortDirection === 1 ? '↑' : '↓';
            document.getElementById(`sort-${column}`).textContent = arrow;
            
            filterTable();
        }

        function filterTable() {
            const queryId = document.getElementById('filterId').value.toLowerCase();
            const queryLevel = document.getElementById('filterLevel').value;
            const queryTitle = document.getElementById('filterTitle').value.toLowerCase();
            const queryDesc = document.getElementById('filterDesc').value.toLowerCase();
            const queryFind = document.getElementById('filterFind').value.toLowerCase();
            
            let filtered = bugs.filter(bug => {
                const matchId = bug.id.toLowerCase().includes(queryId);
                const matchTitle = bug.title.toLowerCase().includes(queryTitle);
                const matchDesc = bug.desc.toLowerCase().includes(queryDesc);
                const matchFind = bug.find.toLowerCase().includes(queryFind);
                
                let matchLevel = true;
                if (queryLevel === 'low') matchLevel = bug.level <= 3;
                else if (queryLevel === 'med') matchLevel = bug.level >= 4 && bug.level <= 7;
                else if (queryLevel === 'high') matchLevel = bug.level >= 8;
                else if (queryLevel !== '') matchLevel = bug.level === parseInt(queryLevel);

                return matchId && matchLevel && matchTitle && matchDesc && matchFind;
            });
            
            if (currentSortColumn === 'id') {
                filtered.sort((a, b) => a.id.localeCompare(b.id) * currentSortDirection);
            } else if (currentSortColumn === 'level') {
                filtered.sort((a, b) => (a.level - b.level) * currentSortDirection);
            }
            
            renderTable(filtered);
        }

        // Initial render
        renderTable(bugs);
    </script>
