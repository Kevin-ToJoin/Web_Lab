# TestLab 101 — Module 3 (Registration Portal) — standalone beginner setup.
#
# This is the ONLY file you need. It PULLS pre-built images (no source code, no
# Git, no build) and starts the whole environment with one command:
#
#   docker compose up
#
# Then open http://localhost:4003/_lab/requirements  (the API)
#      and  http://localhost:8080                     (Adminer — browse the DB)
#
# Stop with Ctrl+C, then:  docker compose down
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: registration     # the registration-api creates its own tables on boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d registration"]
      interval: 3s
      timeout: 3s
      retries: 20

  registration-api:
    image: ghcr.io/kevin-tojoin/web_lab/registration-api:latest
    pull_policy: always
    environment:
      PORT: "4003"
      DATABASE_URL: postgres://lab:lab@db:5432/registration
    ports:
      - "4003:4003"
    depends_on:
      db: { condition: service_healthy }

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      db: { condition: service_healthy }
