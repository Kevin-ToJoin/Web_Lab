# TestLab 101 — Module 4 (Bank Core System) — standalone beginner setup.
#
# This is the ONLY file you need. It PULLS pre-built images (no source code, no
# Git, no build) and starts the whole environment with one command:
#
#   docker compose up
#
# Then open http://localhost:4001/_lab/requirements  (the API)
#      and  http://localhost:8080                     (Adminer — browse the DB)
#
# Stop with Ctrl+C, then:  docker compose down
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: bank             # the bank-api creates its own tables on boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d bank"]
      interval: 3s
      timeout: 3s
      retries: 20

  bank-api:
    image: ghcr.io/kevin-tojoin/web_lab/bank-api:latest
    pull_policy: always
    environment:
      PORT: "4001"
      DATABASE_URL: postgres://lab:lab@db:5432/bank
    ports:
      - "4001:4001"
    depends_on:
      db: { condition: service_healthy }

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      db: { condition: service_healthy }
