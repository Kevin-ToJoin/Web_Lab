# TestLab 101 — Module 11 (Account Security / VaultAuth) — beginner setup.
#
# This is the ONLY file you need. It PULLS pre-built images (no source code, no
# Git, no build) and starts the whole environment with one command:
#
#   docker compose up
#
# Then open http://localhost:4010/_lab/requirements  (the API)
#      and  http://localhost:8080                     (Adminer — browse the DB)
#
# Stop with Ctrl+C, then:  docker compose down
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: auth       # the auth-api creates its own tables on boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d auth"]
      interval: 3s
      timeout: 3s
      retries: 20

  auth-api:
    image: ghcr.io/kevin-tojoin/web_lab/auth-api:latest
    pull_policy: always
    environment:
      PORT: "4010"
      DATABASE_URL: postgres://lab:lab@db:5432/auth
    ports:
      - "4010:4010"
    depends_on:
      db: { condition: service_healthy }

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      db: { condition: service_healthy }
