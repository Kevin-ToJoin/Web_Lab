# TestLab 101 — API & Data track (modular, one service per module).
#
# The frontend lab (tojoin.org/Lab101) is the presentation layer. THIS stack is
# the backend layer: each frontend module gets a matching real API here, so you
# can test the same domain at the integration/system/API/DB level with curl,
# Postman, psql, and k6.
#
# All modules share ONE Postgres (one database each) and reuse infra. Bring up
# everything, or just one module:
#   docker compose up --build                 # all modules
#   docker compose up --build ecommerce-api ecommerce-worker db redis
#   docker compose up --build bank-api db
#
# Ports: ecommerce-api :4000 · bank-api :4001 · Adminer :8080 · Postgres :5432
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: lab
    ports:
      - "5432:5432"
    volumes:
      # 00 creates the per-module databases; every module self-applies its own
      # schema on startup via src/initDb.ts (idempotent) — no schema mounts.
      - ./db/00-databases.sql:/docker-entrypoint-initdb.d/00-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d lab"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      db: { condition: service_healthy }

  # ── Ecommerce module (OrderFlow): HTTP contracts, DB integrity, queues ──
  ecommerce-api:
    build: ./services/ecommerce
    command: npx tsx src/server.ts
    environment:
      PORT: "4000"
      DATABASE_URL: postgres://lab:lab@db:5432/ecommerce
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  ecommerce-worker:
    build: ./services/ecommerce
    command: npx tsx src/worker.ts
    environment:
      DATABASE_URL: postgres://lab:lab@db:5432/ecommerce
      REDIS_URL: redis://redis:6379
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ── Bank module (Vault Online): transactions, ledger integrity, concurrency ──
  bank-api:
    build: ./services/bank
    command: npx tsx src/server.ts
    environment:
      PORT: "4001"
      DATABASE_URL: postgres://lab:lab@db:5432/bank
    ports:
      - "4001:4001"
    depends_on:
      db: { condition: service_healthy }

  # ── Catalog module (TechMart): search, pagination, sorting, reviews ──
  catalog-api:
    build: ./services/catalog
    command: npx tsx src/server.ts
    environment:
      PORT: "4002"
      DATABASE_URL: postgres://lab:lab@db:5432/catalog
    ports:
      - "4002:4002"
    depends_on:
      db: { condition: service_healthy }

  # ── Registration module (DevPortal): signup, email verification, login ──
  registration-api:
    build: ./services/registration
    command: npx tsx src/server.ts
    environment:
      PORT: "4003"
      DATABASE_URL: postgres://lab:lab@db:5432/registration
    ports:
      - "4003:4003"
    depends_on:
      db: { condition: service_healthy }

  # ── Healthcare module (Patient Portal): scheduling, clinical logic, PHI ──
  healthcare-api:
    build: ./services/healthcare
    command: npx tsx src/server.ts
    environment:
      PORT: "4004"
      DATABASE_URL: postgres://lab:lab@db:5432/healthcare
    ports:
      - "4004:4004"
    depends_on:
      db: { condition: service_healthy }

  # ── Trading module (Trading Desk): orders, positions, money/concurrency ──
  trading-api:
    build: ./services/trading
    command: npx tsx src/server.ts
    environment:
      PORT: "4005"
      DATABASE_URL: postgres://lab:lab@db:5432/trading
    ports:
      - "4005:4005"
    depends_on:
      db: { condition: service_healthy }
