# TestLab 101 — API & Data track.
# One command to bring up a deliberately-buggy backend for QA practice:
#   docker compose up --build
#
# Services:
#   api      → the buggy REST API                 http://localhost:4000
#   worker   → the async job consumer (BullMQ)     (no port; watch via /admin/queue)
#   db       → Postgres, seeded with known issues   localhost:5432
#   redis    → queue backend                        localhost:6379
#   adminer  → visual DB inspector                  http://localhost:8080
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: orderflow
    ports:
      - "5432:5432"
    volumes:
      - ./api/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d orderflow"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./api
    command: npx tsx src/server.ts
    environment:
      PORT: "4000"
      DATABASE_URL: postgres://lab:lab@db:5432/orderflow
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: ./api
    command: npx tsx src/worker.ts
    environment:
      DATABASE_URL: postgres://lab:lab@db:5432/orderflow
      REDIS_URL: redis://redis:6379
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      db: { condition: service_healthy }
